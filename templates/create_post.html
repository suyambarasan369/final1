{% extends "base.html" %}

{% block content %}
<h2>Create Post</h2>

<form action="/create_post" method="post" enctype="multipart/form-data">
    <label for="file">Video/Image:</label><br>
    <input type="file" name="file" id="file" accept="video/*,image/*"><br><br>

    <label for="content">Content:</label><br>
    <textarea name="content" id="content" rows="6" cols="60" placeholder="Enter post content"></textarea><br><br>

    <button type="submit">Post</button>
</form>

{% endblock %}
